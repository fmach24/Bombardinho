apiVersion: apps/v1
kind: Deployment
metadata:
  name: bombardinho
  labels:
    app: bombardinho
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bombardinho
  template:
    metadata:
      labels:
        app: bombardinho
    spec:
      containers:
        - name: bombardinho
          image: ghcr.io/fmach24/bombardinho:latest
          ports:
            - containerPort: 5678
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5678"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 20
            periodSeconds: 30
