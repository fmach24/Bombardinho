apiVersion: v1
kind: Service
metadata:
  name: bombardinho
  annotations:
    # TCP protocol — passes WebSocket upgrade headers untouched (layer 4)
    # Without this NodeBalancer operates at HTTP (layer 7) and breaks Socket.IO
    service.beta.kubernetes.io/linode-loadbalancer-protocol: "tcp"
    # Sticky sessions — required for Socket.IO without Redis adapter
    service.beta.kubernetes.io/linode-loadbalancer-session-stickiness: "table"
    service.beta.kubernetes.io/linode-loadbalancer-session-stickiness-timeout: "10800"
spec:
  type: LoadBalancer
  selector:
    app: bombardinho
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5678