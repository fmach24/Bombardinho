name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:    ${{ secrets.AWS_REGION }}
  ECR_REPO:      ${{ secrets.ECR_REPOSITORY_URL }}
  ECS_CLUSTER:   ${{ secrets.ECS_CLUSTER_NAME }}
  ECS_SERVICE:   ${{ secrets.ECS_SERVICE_NAME }}
  GHCR_IMAGE:    ghcr.io/${{ github.repository_owner }}/bombardinho

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: node --check server.js

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          TAG="${{ github.sha }}"
          docker build \
            -t "${{ env.ECR_REPO }}:${TAG}" \
            -t "${{ env.ECR_REPO }}:latest" \
            -t "${{ env.GHCR_IMAGE }}:${TAG}" \
            -t "${{ env.GHCR_IMAGE }}:latest" \
            .

      - name: Push to AWS ECR
        run: |
          docker push "${{ env.ECR_REPO }}:${{ github.sha }}"
          docker push "${{ env.ECR_REPO }}:latest"

      - name: Push to GitHub Container Registry
        continue-on-error: true
        run: |
          docker push "${{ env.GHCR_IMAGE }}:${{ github.sha }}"
          docker push "${{ env.GHCR_IMAGE }}:latest"

  deploy-ecs:
    name: Deploy → ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update ECS service
        run: |
          ECR_IMAGE="${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition bombardinho \
            --query taskDefinition)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$ECR_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .compatibilities,
                 .registeredAt, .registeredBy)')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "$NEW_TASK_ARN" \
            --force-new-deployment

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"
          echo "✅ ECS deployment complete"

  deploy-lke:
    name: Deploy → Akamai LKE
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubeconfig for LKE
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.AKAMAI_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml

      - name: Roll out new image
        run: |
          kubectl set image deployment/bombardinho \
            bombardinho=${{ env.GHCR_IMAGE }}:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/bombardinho --timeout=120s
          echo "✅ LKE deployment complete"

      - name: Print NodeBalancer IP
        run: |
          echo "## ☁️ Akamai LKE" >> "$GITHUB_STEP_SUMMARY"
          kubectl get service bombardinho \
            -o jsonpath='IP: {.status.loadBalancer.ingress[0].ip}' \
            >> "$GITHUB_STEP_SUMMARY" || true