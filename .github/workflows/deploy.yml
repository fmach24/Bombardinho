# .github/workflows/deploy.yml
#
# Pipeline: push to main → build Docker image → push to ECR → deploy to ECS Fargate
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID      — IAM user key
#   AWS_SECRET_ACCESS_KEY  — IAM user secret
#   AWS_REGION             — e.g. eu-central-1
#   ECR_REPOSITORY_URL     — from `terraform output ecr_repository_url`
#   ECS_CLUSTER_NAME       — from `terraform output ecs_cluster_name`
#   ECS_SERVICE_NAME       — from `terraform output ecs_service_name`

name: Build & Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REPO:         ${{ secrets.ECR_REPOSITORY_URL }}
  ECS_CLUSTER:      ${{ secrets.ECS_CLUSTER_NAME }}
  ECS_SERVICE:      ${{ secrets.ECS_SERVICE_NAME }}

jobs:
  # ── Job 1: Lint & basic checks ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Add your linter here if you add eslint later
      - name: Check for syntax errors
        run: node --check server.js

  # ── Job 2: Build Docker image & push to ECR ─────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        run: |
          # Short SHA for immutable image tags
          IMAGE_TAG="${{ github.sha }}"
          FULL_IMAGE="${{ env.ECR_REPO }}:${IMAGE_TAG}"

          docker build -t "$FULL_IMAGE" .
          docker tag  "$FULL_IMAGE" "${{ env.ECR_REPO }}:latest"

          docker push "$FULL_IMAGE"
          docker push "${{ env.ECR_REPO }}:latest"

          echo "image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

  # ── Job 3: Deploy new image to ECS Fargate ───────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production  # optional: require manual approval in GitHub

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update ECS service with new image
        run: |
          # Fetch current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition bombardinho \
            --query taskDefinition)

          # Swap image tag to the newly built one
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "${{ needs.build-and-push.outputs.image }}" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .compatibilities,
                 .registeredAt, .registeredBy)')

          # Register the updated task definition
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Force a new deployment
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "$NEW_TASK_ARN" \
            --force-new-deployment

      - name: Wait for stable deployment
        run: |
          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"
          echo "✅ Deployment complete!"

      - name: Print deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ needs.build-and-push.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Cluster** | \`${{ env.ECS_CLUSTER }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | \`${{ env.ECS_SERVICE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
